name: Package Current Authoritative Phase 4.1 Source

on:
  push:
    branches:
      - tooling/phase-4.1-source-snapshot
    paths:
      - ".github/workflows/phase41-source-snapshot.yml"
  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/phase41-source-snapshot.yml"

permissions:
  contents: read

jobs:
  package:
    if: github.event_name == 'push' || github.head_ref == 'tooling/phase-4.1-source-snapshot'
    runs-on: ubuntu-latest
    steps:
      - name: Check out exact authoritative review head
        uses: actions/checkout@v4
        with:
          ref: 4907d6e990b48df719fd6473ee79d90bebc3b7ef
          fetch-depth: 0
          persist-credentials: false

      - name: Verify exact source identity
        shell: bash
        run: |
          set -euo pipefail
          expected="4907d6e990b48df719fd6473ee79d90bebc3b7ef"
          actual="$(git rev-parse HEAD)"
          test "$actual" = "$expected"
          test -z "$(git status --porcelain)"
          test -f kernel/approvals/decision-store.js
          test -f kernel/runtime/agent-registry.js
          test -f kernel/runtime/runtime-provenance.js
          test -f kernel/runtime/sandbox-exec.c
          test -f kernel/execution/runtime-isolation-recovery.js
          test -f tests/runtime-isolation-recovery.test.js
          grep -q 'inlineReq=requireTarget' scripts/bypass-audit.js
          grep -q 'runtime.isolation.barrier.raised' kernel/execution/runtime-isolation-barrier.js
          grep -q 'same barrier hash re-raised after authorized clearance remains protected' tests/runtime-isolation-recovery.test.js

      - name: Build cryptographically tied bundle and source archive
        shell: bash
        run: |
          set -euo pipefail
          expected="4907d6e990b48df719fd6473ee79d90bebc3b7ef"
          mkdir -p authoritative-phase41-source
          git branch -f authoritative-phase41-review "$expected"
          git bundle create authoritative-phase41-source/the-citizen-audit-4907d6e.bundle refs/heads/authoritative-phase41-review
          git bundle verify authoritative-phase41-source/the-citizen-audit-4907d6e.bundle
          git archive --format=tar.gz --prefix=the-citizen-audit-4907d6e/ -o authoritative-phase41-source/the-citizen-audit-4907d6e-source.tar.gz "$expected"
          cat > authoritative-phase41-source/VERIFY.txt <<'EOF'
          AUTHORITATIVE COMMIT
          4907d6e990b48df719fd6473ee79d90bebc3b7ef

          VERIFY
          1. git bundle verify the-citizen-audit-4907d6e.bundle
          2. git clone the-citizen-audit-4907d6e.bundle citizen-audit-review
          3. cd citizen-audit-review
          4. git checkout authoritative-phase41-review
          5. git rev-parse HEAD
          6. Confirm the result is exactly:
             4907d6e990b48df719fd6473ee79d90bebc3b7ef
          7. Confirm git status --short is empty.
          EOF
          (
            cd authoritative-phase41-source
            sha256sum the-citizen-audit-4907d6e.bundle the-citizen-audit-4907d6e-source.tar.gz VERIFY.txt > SHA256SUMS
          )

      - name: Upload authoritative source package
        uses: actions/upload-artifact@v4
        with:
          name: authoritative-phase41-source-4907d6e
          path: authoritative-phase41-source/
          if-no-files-found: error
          retention-days: 7
