name: Phase 4.1 Verified Correction Transfer

on:
  push:
    branches:
      - tooling/phase-4.1-source-snapshot
    paths:
      - ".phase41-transfer/**"
      - ".github/scripts/phase41-transfer.sh"
      - ".github/workflows/phase41-source-snapshot.yml"
  pull_request:
    branches:
      - main
    paths:
      - ".phase41-transfer/**"
      - ".github/scripts/phase41-transfer.sh"
      - ".github/workflows/phase41-source-snapshot.yml"

permissions:
  contents: write

concurrency:
  group: phase41-correction-transfer
  cancel-in-progress: false

jobs:
  apply:
    if: github.event_name == 'push' || github.head_ref == 'tooling/phase-4.1-source-snapshot'
    runs-on: ubuntu-latest
    steps:
      - name: Check out tooling transfer branch
        uses: actions/checkout@v4
        with:
          ref: tooling/phase-4.1-source-snapshot
          fetch-depth: 0

      - name: Export chunk 13 for byte comparison
        uses: actions/upload-artifact@v4
        with:
          name: phase41-transfer-part13
          path: .phase41-transfer/part-13
          if-no-files-found: error
          retention-days: 1

      - name: Apply verified correction commits
        shell: bash
        run: bash .github/scripts/phase41-transfer.sh
