name: Package Authoritative Phase 4.1 Source

on:
  push:
    branches:
      - tooling/phase-4.1-source-snapshot
    paths:
      - ".github/workflows/phase41-source-snapshot.yml"

permissions:
  contents: read

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - name: Check out exact authoritative review head
        uses: actions/checkout@v4
        with:
          ref: 1407a104f891726547e82fcba7004fed930f17d2
          fetch-depth: 0
          persist-credentials: false

      - name: Verify and package cryptographically tied source
        shell: bash
        run: |
          set -euo pipefail
          expected="1407a104f891726547e82fcba7004fed930f17d2"
          actual="$(git rev-parse HEAD)"
          test "$actual" = "$expected"
          test -z "$(git status --porcelain)"
          test -f kernel/approvals/decision-store.js
          test -f kernel/runtime/agent-registry.js
          test -f kernel/runtime/runtime-provenance.js
          test -f kernel/runtime/sandbox-exec.c
          test -f kernel/execution/runtime-isolation-recovery.js
          test -f tests/runtime-isolation-recovery.test.js
          test ! -e kernel/events/write.js

          mkdir -p authoritative-phase41-source
          git branch -f authoritative-phase41-review "$expected"
          git bundle create authoritative-phase41-source/the-citizen-audit-1407a104.bundle refs/heads/authoritative-phase41-review
          git bundle verify authoritative-phase41-source/the-citizen-audit-1407a104.bundle
          git archive --format=tar.gz --prefix=the-citizen-audit-1407a104/ -o authoritative-phase41-source/the-citizen-audit-1407a104-source.tar.gz "$expected"

          cat > authoritative-phase41-source/VERIFY.txt <<'EOF'
          AUTHORITATIVE COMMIT
          1407a104f891726547e82fcba7004fed930f17d2

          RECOMMENDED VERIFICATION
          1. git clone the-citizen-audit-1407a104.bundle citizen-audit-review
          2. cd citizen-audit-review
          3. git checkout 1407a104f891726547e82fcba7004fed930f17d2
          4. git rev-parse HEAD
          5. Confirm the output is exactly:
             1407a104f891726547e82fcba7004fed930f17d2
          6. Confirm these files exist:
             kernel/approvals/decision-store.js
             kernel/runtime/agent-registry.js
             kernel/runtime/runtime-provenance.js
             kernel/runtime/sandbox-exec.c
             kernel/execution/runtime-isolation-recovery.js
             tests/runtime-isolation-recovery.test.js
          7. Confirm kernel/events/write.js does not exist.

          The .bundle file is the authoritative review input because it retains Git object identity.
          The source tarball is provided only for convenient inspection.
          EOF

          (
            cd authoritative-phase41-source
            sha256sum the-citizen-audit-1407a104.bundle the-citizen-audit-1407a104-source.tar.gz VERIFY.txt > SHA256SUMS
          )

      - name: Upload authoritative source package
        uses: actions/upload-artifact@v4
        with:
          name: authoritative-phase41-source-1407a104
          path: authoritative-phase41-source/
          if-no-files-found: error
          retention-days: 7
