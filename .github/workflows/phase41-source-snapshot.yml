name: Phase 4.1 Remote Status Transfer

on:
  push:
    branches:
      - tooling/phase-4.1-source-snapshot
    paths:
      - ".phase41-transfer/remote-status.patch"
      - ".github/workflows/phase41-source-snapshot.yml"
  pull_request:
    branches:
      - main
    paths:
      - ".phase41-transfer/remote-status.patch"
      - ".github/workflows/phase41-source-snapshot.yml"

permissions:
  contents: write

concurrency:
  group: phase41-remote-status-transfer
  cancel-in-progress: false

jobs:
  apply:
    if: github.event_name == 'push' || github.head_ref == 'tooling/phase-4.1-source-snapshot'
    runs-on: ubuntu-latest
    steps:
      - name: Apply observed verification status to the correction branch
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          EXPECTED_HEAD: c154712de4190ca785deda18fc48b32bba8318d5
          TARGET_BRANCH: execution-engine-v2-phase-4-corrected-review
        run: |
          set -euo pipefail
          git clone --quiet --depth=1 --branch tooling/phase-4.1-source-snapshot \
            "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" transfer
          cd transfer
          echo "be3981cbde759f4b7bf390b5da7dc1add44e2e025721e93dc5c880dfc8aca2e7  .phase41-transfer/remote-status.patch" | sha256sum --check --strict
          cp .phase41-transfer/remote-status.patch /tmp/phase41-remote-status.patch
          git fetch --quiet --no-tags origin "refs/heads/$TARGET_BRANCH:refs/remotes/origin/$TARGET_BRANCH"
          current="$(git rev-parse "origin/$TARGET_BRANCH")"
          if [[ "$current" != "$EXPECTED_HEAD" ]]; then
            echo "Target branch changed unexpectedly: expected $EXPECTED_HEAD, found $current" >&2
            exit 1
          fi
          git checkout --quiet --detach "$EXPECTED_HEAD"
          git apply --check /tmp/phase41-remote-status.patch
          git apply /tmp/phase41-remote-status.patch
          changed="$(git diff --name-only)"
          expected=$'docs/institution-os/execution-v2-phase-4.1-corrections.md\ndocs/institution-os/execution-v2-progress.md'
          if [[ "$changed" != "$expected" ]]; then
            echo "Unexpected documentation patch paths:" >&2
            printf '%s\n' "$changed" >&2
            exit 1
          fi
          git config user.name "The Citizen Audit Phase 4.1"
          git config user.email "phase41@users.noreply.github.com"
          git add docs/institution-os/execution-v2-phase-4.1-corrections.md docs/institution-os/execution-v2-progress.md
          git commit --quiet -m "Record observed Phase 4.1 remote verification"
          git push --quiet origin "HEAD:refs/heads/$TARGET_BRANCH" \
            --force-with-lease="refs/heads/$TARGET_BRANCH:$EXPECTED_HEAD"
          echo "Transferred Phase 4.1 status head: $(git rev-parse HEAD)"
