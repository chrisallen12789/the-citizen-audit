name: Phase 4.1 Verified Correction Transfer

on:
  push:
    branches:
      - tooling/phase-4.1-source-snapshot
    paths:
      - ".phase41-transfer/**"
      - ".github/scripts/phase41-transfer.sh"
      - ".github/workflows/phase41-source-snapshot.yml"
  pull_request:
    branches:
      - main
    paths:
      - ".phase41-transfer/**"
      - ".github/scripts/phase41-transfer.sh"
      - ".github/workflows/phase41-source-snapshot.yml"

permissions:
  contents: write

concurrency:
  group: phase41-correction-transfer
  cancel-in-progress: false

jobs:
  apply:
    if: github.event_name == 'push' || github.head_ref == 'tooling/phase-4.1-source-snapshot'
    runs-on: ubuntu-latest
    steps:
      - name: Clone transfer branch and apply verified commits
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git clone --quiet --depth=1 --branch tooling/phase-4.1-source-snapshot \
            "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" transfer
          cd transfer
          python3 - <<'PY'
          from pathlib import Path
          path = Path('.github/scripts/phase41-transfer.sh')
          text = path.read_text()
          restore_marker = 'git restore .phase41-transfer/part-13\n'
          restore_insertion = restore_marker + 'git restore .github/scripts/phase41-transfer.sh\n'
          commit_marker = 'if git diff --name-only "$EXPECTED_HEAD"..HEAD | grep -E \'^(platform/|schemas/platform-)\'; then'
          commit_insertion = '''git restore --source=HEAD^ --staged --worktree -- \\
            .github/workflows/execution-engine-phase4.yml \\
            .github/workflows/execution-engine-tests.yml
          git commit --quiet --amend --no-edit

          '''
          if text.count(restore_marker) != 1 or text.count(commit_marker) != 1:
              raise SystemExit('transfer-script insertion marker was not unique')
          text = text.replace(restore_marker, restore_insertion)
          text = text.replace(commit_marker, commit_insertion + commit_marker)
          path.write_text(text)
          PY
          bash .github/scripts/phase41-transfer.sh
