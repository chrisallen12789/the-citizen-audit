name: Phase 3 Source Snapshot

on:
  push:
    branches:
      - execution-engine-v2-phase-3
  pull_request:
    branches:
      - main

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Upload source snapshot
        uses: actions/upload-artifact@v4
        with:
          name: phase3-source-snapshot
          path: |
            .
            !.git/**
          include-hidden-files: true
          retention-days: 1
