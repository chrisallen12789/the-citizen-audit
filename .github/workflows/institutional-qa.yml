name: Institutional QA

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  institutional-qa:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Export ADS records
        run: npm run ads:export

      - name: Validate ADS records
        run: npm run ads:validate

      - name: Build publication assets
        run: npm run build:publication
        env:
          CANONICAL_PDF_PATH: public/downloads/the-citizen-audit-v1.0.pdf

      - name: Run institutional QA
        run: npm run qa
