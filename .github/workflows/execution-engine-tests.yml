name: Execution Engine Tests

on:
  push:
    branches:
      - main
    paths:
      - "kernel/execution/**"
      - "kernel/lib/append-only-log.js"
      - "kernel/lib/canonical-json.js"
      - "schemas/execution-*.schema.json"
      - "tests/execution-*.test.js"
      - "package.json"
      - ".github/workflows/execution-engine-tests.yml"
  pull_request:
    branches:
      - main
    paths:
      - "kernel/execution/**"
      - "kernel/lib/append-only-log.js"
      - "kernel/lib/canonical-json.js"
      - "schemas/execution-*.schema.json"
      - "tests/execution-*.test.js"
      - "package.json"
      - ".github/workflows/execution-engine-tests.yml"

jobs:
  execution-engine-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Run Execution Engine tests
        id: execution_tests
        shell: bash
        run: |
          set +e
          npm run execution:test > execution-test-output.txt 2>&1
          status=$?
          cat execution-test-output.txt
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit "$status"

      - name: Upload execution test diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: execution-test-output
          path: execution-test-output.txt
          if-no-files-found: error
          retention-days: 3
