name: Execution Engine Tests

on:
  push:
    branches:
      - main
    paths:
      - "kernel/execution/**"
      - "kernel/runtime/**"
      - "kernel/approvals/**"
      - "kernel/authority/approval-authorities.json"
      - "agents/registry.json"
      - "kernel/events/**"
      - "kernel/lib/append-only-log.js"
      - "kernel/lib/canonical-json.js"
      - "schemas/execution-*.schema.json"
      - "tests/execution-*.test.js"
      - "tests/runtime-*.test.js"
      - "tests/event-projection.test.js"
      - "tests/bypass-audit.test.js"
      - "tests/support/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/execution-engine-tests.yml"
  pull_request:
    branches:
      - main
    paths:
      - "kernel/execution/**"
      - "kernel/runtime/**"
      - "kernel/approvals/**"
      - "kernel/authority/approval-authorities.json"
      - "agents/registry.json"
      - "kernel/events/**"
      - "kernel/lib/append-only-log.js"
      - "kernel/lib/canonical-json.js"
      - "schemas/execution-*.schema.json"
      - "tests/execution-*.test.js"
      - "tests/runtime-*.test.js"
      - "tests/event-projection.test.js"
      - "tests/bypass-audit.test.js"
      - "tests/support/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/execution-engine-tests.yml"

jobs:
  execution-engine-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Enable user namespaces for sandbox verification
        shell: bash
        run: |
          set -euo pipefail
          if [[ -e /proc/sys/kernel/apparmor_restrict_unprivileged_userns ]]; then
            sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0
          fi
          if [[ -e /proc/sys/kernel/unprivileged_userns_clone ]]; then
            sudo sysctl -w kernel.unprivileged_userns_clone=1
          fi
          unshare --user --map-root-user --mount /bin/true

      - name: Verify execution and runtime module syntax
        shell: bash
        run: |
          find kernel/execution kernel/runtime kernel/events kernel/approvals -type f -name '*.js' -print0 \
            | sort -z \
            | xargs -0 -n1 node --check

      - name: Run Execution Engine tests
        id: execution_tests
        shell: bash
        run: |
          set +e
          npm run execution:test > execution-test-output.txt 2>&1
          status=$?
          cat execution-test-output.txt
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit "$status"

      - name: Upload execution test diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: execution-test-output
          path: execution-test-output.txt
          if-no-files-found: ignore
          retention-days: 3
