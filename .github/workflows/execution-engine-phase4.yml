name: Execution Engine Phase 4

# Runtime integration, event projection, bypass audit, isolation, and
# tamper/fault-injection checks for the Execution Engine v2 Phase 4 candidate.

on:
  push:
    branches:
      - main
    paths:
      - "kernel/runtime/**"
      - "kernel/events/**"
      - "kernel/execution/**"
      - "scripts/bypass-audit.js"
      - "scripts/bypass-audit-config.json"
      - "scripts/project-execution-events.js"
      - "tests/runtime-integration.test.js"
      - "tests/runtime-isolation.test.js"
      - "tests/event-projection.test.js"
      - "tests/bypass-audit.test.js"
      - "package.json"
      - ".github/workflows/execution-engine-phase4.yml"
  pull_request:
    branches:
      - main
    paths:
      - "kernel/runtime/**"
      - "kernel/events/**"
      - "kernel/execution/**"
      - "scripts/bypass-audit.js"
      - "scripts/bypass-audit-config.json"
      - "scripts/project-execution-events.js"
      - "tests/runtime-integration.test.js"
      - "tests/runtime-isolation.test.js"
      - "tests/event-projection.test.js"
      - "tests/bypass-audit.test.js"
      - "package.json"
      - ".github/workflows/execution-engine-phase4.yml"

jobs:
  phase4:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Verify runtime and events module syntax
        shell: bash
        run: |
          find kernel/runtime kernel/events -type f -name '*.js' -print0 \
            | sort -z \
            | xargs -0 -n1 node --check

      - name: Compile sandbox launcher with warnings as errors
        run: gcc -O2 -static -Wall -Wextra -Werror -o /tmp/sandbox-exec-ci kernel/runtime/sandbox-exec.c

      - name: Repository-wide mutation bypass audit
        run: npm run bypass:audit

      - name: Bypass audit self-tests
        run: npm run bypass:audit:test

      - name: Runtime integration tests
        run: npm run runtime:integration:test

      - name: Runtime isolation tests
        run: npm run runtime:isolation:test

      - name: Event projection tests
        run: npm run events:test

      - name: Tamper tests
        run: npm run tamper:test

      - name: Fault-injection tests
        run: npm run fault:test

      - name: Institutional QA
        run: npm run qa

      - name: Full Phase 1-4 execution tests
        run: npm run execution:test
